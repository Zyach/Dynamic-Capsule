name: Android Release

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '19'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

  release:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '19'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Validate signing configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Actions secret: $name" >&2
              exit 1
            fi
          done

      - name: Compute release version
        id: version
        shell: bash
        run: |
          BASE_VERSION_NAME=$(sed -n "s/.*def baseVersionName = '\(.*\)'/\1/p" app/build.gradle | head -n1)
          BASE_VERSION_CODE=$(sed -n "s/.*def baseVersionCode = \([0-9][0-9]*\).*/\1/p" app/build.gradle | head -n1)
          VERSION_CODE=$((BASE_VERSION_CODE + GITHUB_RUN_NUMBER))
          VERSION_NAME="${BASE_VERSION_NAME}+${GITHUB_RUN_NUMBER}"
          TAG_NAME="v${VERSION_NAME}"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Prepare release asset
        shell: bash
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          test -n "$APK_PATH"
          cp "$APK_PATH" "dynamic-capsule-${{ steps.version.outputs.version_name }}.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Dynamic Capsule ${{ steps.version.outputs.version_name }}
          generate_release_notes: true
          files: dynamic-capsule-${{ steps.version.outputs.version_name }}.apk

      - name: Clean signing keystore
        if: always()
        run: rm -f release.keystore
